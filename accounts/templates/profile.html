<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ student.name }}'s Profile</title>
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.8rem;
      color: #1a1a1a;
    }

    .field {
      margin-bottom: 1rem;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 0.2rem;
    }

    .value {
      font-size: 1rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Data</h1>

    <div class="field">
      <p class="label">Course</p>
      <p class="value">{{ student.course }}</p>
    </div>

    <div class="field">
      <p class="label">Age</p>
      <p class="value">{{ student.age }}</p>
    </div>
  </div>
</body>
</html>
